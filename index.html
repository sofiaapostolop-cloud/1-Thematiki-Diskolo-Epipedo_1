<style>

 if(q.type==='text'){
   let saved=answers[qi]||'';
   h+=`<input class="textanswer" type="text" value="${esc(saved)}" oninput="answers[${qi}]=this.value" placeholder="Πληκτρολόγησε την απάντηση">`;
 }
 let f=checked[qi]; if(f){h+=`<div class="feedback ${f.ok?'good':'bad'}"><strong>${f.ok?'Σωστό.':'Λάθος.'}</strong> ${esc(q.feedback)}</div>`}
 document.getElementById('qbox').innerHTML=h;
}
function saveChoice(qi,i,type,on){if(type==='mc'){answers[qi]=[i]}else{let a=answers[qi]||[]; if(on&&!a.includes(i))a.push(i); if(!on)a=a.filter(x=>x!==i); answers[qi]=a}}
function normText(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ς/g,'σ').replace(/[^a-zα-ω0-9]/g,'');}
function textCorrect(q,a){let n=normText(a); if(!n) return false; return q.components.every(c=>n.includes(normText(c)));}
function isCorrect(qi){
 let q=questions[qi],a=answers[qi];
 if(q.type==='mc') return Array.isArray(a)&&a[0]===q.answer;
 if(q.type==='ms') return Array.isArray(a)&&a.length===q.answers.length&&q.answers.every(x=>a.includes(x));
 if(q.type==='text') return textCorrect(q,a);
 return false;
}
function checkCurrent(){let qi=order[cur];checked[qi]={ok:isCorrect(qi)};render()}
function nextQ(){let qi=order[cur]; if(!checked[qi]) checkCurrent(); if(cur===questions.length-1){finish();return} cur++;render()}
function prevQ(){if(cur>0){cur--;render()}}
function finish(){document.getElementById('quiz').classList.add('hidden');document.getElementById('done').classList.remove('hidden');let correct=0;questions.forEach((q,i)=>{if(isCorrect(i))correct++});let pct=Math.round(correct/questions.length*100);document.getElementById('scoreText').textContent=`${correct} / ${questions.length} (${pct}%)`;let cats={};questions.forEach((q,i)=>{cats[q.cat]=cats[q.cat]||[0,0];cats[q.cat][1]++; if(isCorrect(i)) cats[q.cat][0]++});document.getElementById('stats').innerHTML=Object.entries(cats).map(([c,[ok,tot]])=>`<div class="stat"><strong>${esc(c)}</strong><br>${ok}/${tot}</div>`).join('')}
function correctText(q){if(q.type==='mc') return q.choices[q.answer]; if(q.type==='ms') return q.answers.map(i=>q.choices[i]).join(' · '); if(q.type==='text') return q.expected; return '';}
function showReview(){let r=document.getElementById('review');r.classList.remove('hidden');r.innerHTML='<h3>Ανασκόπηση</h3>'+questions.map((q,i)=>`<div class="reviewitem"><span class="${isCorrect(i)?'ok':'no'}">${isCorrect(i)?'✓':'✗'}</span> <strong>${i+1}. ${esc(q.cat)}</strong><br>${esc(q.prompt)}<br><span class="small"><strong>Ενδεικτική σωστή απάντηση:</strong> ${esc(correctText(q))}<br>${esc(q.feedback)}</span></div>`).join('')}
</script>
</body></html>
